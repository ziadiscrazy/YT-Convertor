[phases.setup]
nixPkgs = ["...", "ffmpeg", "python3"]

[phases.build]
cmds = [
  "npm install",
  "node -e \"const { execSync } = require('child_process'); const platform = process.platform; const cmd = platform === 'win32' ? 'curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o yt-dlp.exe' : 'curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp && chmod +x yt-dlp'; console.log('Downloading yt-dlp...'); execSync(cmd, { stdio: 'inherit' });\""
]
